# CI — typecheck, build, testes do core e testes das Security Rules (arquitetura §6)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # emulador do Firestore exige Java 11+
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Typecheck e build
        run: pnpm build

      - name: Testes das regras de negócio (core)
        run: pnpm --filter @gestao-hb/core test

      - name: Testes das Security Rules (emulador)
        run: npx firebase-tools emulators:exec --only firestore --project demo-gestao-hb "pnpm --filter @gestao-hb/rules-tests test"
